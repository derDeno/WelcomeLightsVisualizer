name: Update Template Manifest

on:
  push:
    paths:
      - "templates/*.json"
      - "scripts/generate_template_manifest.py"
      - ".github/workflows/update-template-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-template-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate template manifest
        run: python3 scripts/generate_template_manifest.py

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update template manifest"
          file_pattern: templates/index.json
